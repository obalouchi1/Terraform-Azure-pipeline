trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  - group: terraform-secrets   # contains ARM_CLIENT_ID, ARM_CLIENT_SECRET, ARM_SUBSCRIPTION_ID, ARM_TENANT_ID
  - name: TF_VERSION
    value: '1.7.5'
  - name: TF_WORKING_DIR
    value: '$(System.DefaultWorkingDirectory)'

stages:

  # ── STAGE 1: Validate & Plan ──────────────────────────────────────────────
  - stage: Plan
    displayName: 'Validate & Plan'
    jobs:
      - job: TerraformPlan
        displayName: 'terraform fmt + validate + plan'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Bash@3
            displayName: 'Install Terraform $(TF_VERSION)'
            inputs:
              targetType: inline
              script: |
                curl -fsSL https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip -o terraform.zip
                unzip terraform.zip
                sudo mv terraform /usr/local/bin/
                terraform version

          - task: Bash@3
            displayName: 'terraform fmt -check'
            inputs:
              targetType: inline
              workingDirectory: $(TF_WORKING_DIR)
              script: terraform fmt -check -recursive

          - task: Bash@3
            displayName: 'terraform init'
            inputs:
              targetType: inline
              workingDirectory: $(TF_WORKING_DIR)
              script: terraform init -input=false
            env:
              ARM_CLIENT_ID:       $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET:   $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID:       $(ARM_TENANT_ID)

          - task: Bash@3
            displayName: 'terraform validate'
            inputs:
              targetType: inline
              workingDirectory: $(TF_WORKING_DIR)
              script: terraform validate

          - task: Bash@3
            displayName: 'terraform plan'
            inputs:
              targetType: inline
              workingDirectory: $(TF_WORKING_DIR)
              script: terraform plan -input=false -out=tfplan
            env:
              ARM_CLIENT_ID:       $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET:   $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID:       $(ARM_TENANT_ID)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish plan artifact'
            inputs:
              targetPath: '$(TF_WORKING_DIR)/tfplan'
              artifact: 'tfplan'

  # ── STAGE 2: Apply (main branch only, manual approval) ────────────────────
  - stage: Apply
    displayName: 'Apply'
    dependsOn: Plan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: TerraformApply
        displayName: 'terraform apply'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'production'    # configure manual approval gate on this environment in Azure DevOps
        strategy:
          runOnce:
            deploy:
              steps:
                - task: Bash@3
                  displayName: 'Install Terraform $(TF_VERSION)'
                  inputs:
                    targetType: inline
                    script: |
                      curl -fsSL https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip -o terraform.zip
                      unzip terraform.zip
                      sudo mv terraform /usr/local/bin/
                      terraform version

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download plan artifact'
                  inputs:
                    artifactName: 'tfplan'
                    targetPath: '$(TF_WORKING_DIR)'

                - task: Bash@3
                  displayName: 'terraform init'
                  inputs:
                    targetType: inline
                    workingDirectory: $(TF_WORKING_DIR)
                    script: terraform init -input=false
                  env:
                    ARM_CLIENT_ID:       $(ARM_CLIENT_ID)
                    ARM_CLIENT_SECRET:   $(ARM_CLIENT_SECRET)
                    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
                    ARM_TENANT_ID:       $(ARM_TENANT_ID)

                - task: Bash@3
                  displayName: 'terraform apply'
                  inputs:
                    targetType: inline
                    workingDirectory: $(TF_WORKING_DIR)
                    script: terraform apply -input=false tfplan
                  env:
                    ARM_CLIENT_ID:       $(ARM_CLIENT_ID)
                    ARM_CLIENT_SECRET:   $(ARM_CLIENT_SECRET)
                    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
                    ARM_TENANT_ID:       $(ARM_TENANT_ID)
